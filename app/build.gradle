plugins {
    id 'com.android.application'
}

android {
    namespace 'com.blackholes.tracker'
    compileSdk 34

    defaultConfig {
        applicationId "com.blackholes.tracker"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}
